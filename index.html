<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Školní bufet – Objednávka klíčenek Catend</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ffe6f0, #ffffff);
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        border-radius: 20px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        padding: 30px;
    }

    h1 {
        text-align: center;
        color: #e91e63;
        margin-bottom: 10px;
    }

    h2 {
        text-align: center;
        color: #444;
        margin-top: 0;
        font-weight: normal;
    }

    .logo {
        text-align: center;
        margin-bottom: 10px;
    }

    .logo img {
        max-width: 160px;
        width: 100%;
        height: auto;
        display: inline-block;
    }

    .product {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid #eee;
    }

    .product:last-child {
        border-bottom: none;
    }

    .product-name {
        font-size: 18px;
        font-weight: bold;
        color: #333;
    }

    .price {
        color: #888;
        font-size: 14px;
    }

    input[type="number"],
    input[type="text"],
    input[type="tel"] {
        padding: 10px;
        border: 2px solid #ffc1d6;
        border-radius: 10px;
        font-size: 16px;
        width: 100%;
        box-sizing: border-box;
    }

    input[type="number"] {
        width: 80px;
        text-align: center;
    }

    .customer-info {
        margin-top: 30px;
    }

    .customer-info label {
        display: block;
        margin-top: 15px;
        margin-bottom: 5px;
        font-weight: bold;
        color: #555;
    }

    .total {
        margin-top: 30px;
        font-size: 28px;
        text-align: center;
        font-weight: bold;
        color: #e91e63;
        line-height: 1.5;
    }

    button {
        display: block;
        width: 100%;
        margin-top: 25px;
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
        background: #e91e63;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #c2185b;
        transform: scale(1.02);
    }

    .footer {
        text-align: center;
        margin-top: 20px;
        color: #888;
        font-size: 14px;
    }

    .success {
        margin-top: 20px;
        padding: 15px;
        background: #e8f5e9;
        border: 1px solid #4caf50;
        color: #2e7d32;
        border-radius: 10px;
        display: none;
    }
</style>
</head>
<body>

<div class="container">
    <div class="logo">
        <img src="catend_logo.png" alt="Catend logo">
    </div>

    <h1>Catend</h1>
    <h2>objednávka klíčenek</h2>

    <!-- Produkty -->
    <div class="product">
        <div>
            <div class="product-name">Klíčenka černé kočky</div>
            <div class="price">40 Kč</div>
        </div>
        <input type="number" id="blackCat" min="0" value="0" onchange="calculateTotal()">
    </div>

    <div class="product">
        <div>
            <div class="product-name">Klíčenka bílé kočky</div>
            <div class="price">40 Kč</div>
        </div>
        <input type="number" id="whiteCat" min="0" value="0" onchange="calculateTotal()">
    </div>

    <div class="product">
        <div>
            <div class="product-name">Klíčenka kočičí pacičky</div>
            <div class="price">30 Kč</div>
        </div>
        <input type="number" id="paw" min="0" value="0" onchange="calculateTotal()">
    </div>

    <!-- Údaje zákazníka -->
    <div class="customer-info">
        <label for="name">Jméno a příjmení</label>
        <input type="text" id="name" placeholder="Např. Jan Novák">

        <!-- ============================================================ -->
        <!-- NOVÉ POLE č. 1: Telefonní číslo zákazníka                    -->
        <!-- Validace: přesně 9 číslic (bez předvolby)                    -->
        <!-- ============================================================ -->
        <label for="phone">Telefonní číslo</label>
        <input type="tel" id="phone" placeholder="Např. 777123456">

        <!-- ============================================================ -->
        <!-- NOVÉ POLE č. 2: E-mail zákazníka                             -->
        <!-- Validace: musí obsahovat @ a doménu                          -->
        <!-- ============================================================ -->
        <label for="email">E-mail</label>
        <input type="text" id="email" placeholder="Např. jan.novak@email.cz">
    </div>

    <!-- Celková cena -->
    <div class="total">
        Celková cena: <span id="totalPrice">0</span> Kč<br>
        Celkový počet kusů: <span id="totalItems">0</span>
    </div>

    <!-- Tlačítko -->
    <button onclick="sendOrder()">ODESLAT OBJEDNÁVKU</button>

    <!-- Potvrzení – zobrazí se po kliknutí na tlačítko -->
    <div class="success" id="successMessage">
        ✅ Váš e-mailový klient byl otevřen s předvyplněnou objednávkou. Zkontrolujte zprávu a odešlete ji.
    </div>

    <div class="footer">
        Objednávky Catend &copy; 2025
    </div>
</div>

<script>
    // Výpočet celkové ceny
    function calculateTotal() {
        const blackCat = parseInt(document.getElementById('blackCat').value) || 0;
        const whiteCat = parseInt(document.getElementById('whiteCat').value) || 0;
        const paw = parseInt(document.getElementById('paw').value) || 0;

        const total = blackCat * 40 + whiteCat * 40 + paw * 30;
        const totalItems = blackCat + whiteCat + paw;

        document.getElementById('totalPrice').textContent = total;
        document.getElementById('totalItems').textContent = totalItems;
    }

    // ============================================================
    // FUNKCE ODESLÁNÍ OBJEDNÁVKY PŘES MAILTO
    // Otevře e-mailového klienta uživatele s předvyplněnou
    // zprávou obsahující detail objednávky.
    // Příjemce: diatkova.veronika@kostka-skola.cz
    // ============================================================
    function sendOrder() {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();

        const blackCat = parseInt(document.getElementById('blackCat').value) || 0;
        const whiteCat = parseInt(document.getElementById('whiteCat').value) || 0;
        const paw = parseInt(document.getElementById('paw').value) || 0;

        const total = blackCat * 40 + whiteCat * 40 + paw * 30;
        const totalItems = blackCat + whiteCat + paw;

        // --- Validace vstupů ---
        if (!name) {
            alert("Zadejte jméno a příjmení.");
            return;
        }

        if (!phone.match(/^[0-9]{9}$/)) {
            alert("Telefonní číslo musí obsahovat 9 číslic.");
            return;
        }

        if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
            alert("Zadejte platnou e-mailovou adresu.");
            return;
        }

        if (total === 0) {
            alert("Vyberte alespoň jednu položku.");
            return;
        }

        // ============================================================
        // SESTAVENÍ TĚLA E-MAILU
        // Jednotlivé objednané položky se přidají pouze pokud
        // jejich počet je větší než 0.
        // Speciální znaky (mezery, zalomení řádků) jsou
        // zakódovány pomocí encodeURIComponent pro správné
        // fungování odkazu mailto:.
        // ============================================================
        let polozky = "";
        if (blackCat > 0) polozky += `Klíčenka černé kočky: ${blackCat} ks x 40 Kč = ${blackCat * 40} Kč\n`;
        if (whiteCat > 0) polozky += `Klíčenka bílé kočky: ${whiteCat} ks x 40 Kč = ${whiteCat * 40} Kč\n`;
        if (paw > 0)      polozky += `Klíčenka kočičí pacičky: ${paw} ks x 30 Kč = ${paw * 30} Kč\n`;

        const predmet = `Objednávka klíčenek Catend – ${name}`;

        const telo =
`Dobrý den,

zasílám svou objednávku klíčenek Catend.

------------------------------------------
ZÁKAZNÍK
------------------------------------------
Jméno a příjmení: ${name}
Telefon:          ${phone}
E-mail:           ${email}

------------------------------------------
OBJEDNANÉ POLOŽKY
------------------------------------------
${polozky}
------------------------------------------
Celkový počet kusů: ${totalItems}
Celková cena:       ${total} Kč
------------------------------------------

S pozdravem,
${name}`;

        // ============================================================
        // MAILTO ODKAZ
        // Sestaví a spustí odkaz mailto:, který otevře
        // e-mailového klienta uživatele (Outlook, Gmail app,
        // Apple Mail atd.) s předvyplněným příjemcem,
        // předmětem a tělem zprávy.
        // ============================================================
        const mailtoLink =
            "mailto:app@kostka-skola.cz" +
            "?subject=" + encodeURIComponent(predmet) +
            "&body="    + encodeURIComponent(telo);

        window.location.href = mailtoLink;

        // Zobrazení potvrzovací zprávy po kliknutí
        document.getElementById('successMessage').style.display = "block";
    }

    // Inicializace ceny
    calculateTotal();
</script>

</body>
</html>
